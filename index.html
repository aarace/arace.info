<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arace.info</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: #f5f5f0;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
            color: #333;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            display: block;
            padding: 1rem 2rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            font-size: 1.25rem;
            color: #444;
            transition: background 0.2s, border-color 0.2s;
        }

        nav a:hover {
            background: #222;
            color: #fff;
            border-color: #222;
        }
    </style>
</head>
<body>
    <h1>arace.info</h1>
    <nav>
        <a href="https://andrew.arace.info">Andrew</a>
        <a href="https://ava.arace.info">Ava</a>
        <a href="https://enzo.arace.info">Enzo</a>
    </nav>
</body>
</html>
